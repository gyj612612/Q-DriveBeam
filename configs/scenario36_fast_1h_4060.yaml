cache_scene_features: true
cache_batch_size: 64

embed_dim: 256
dropout: 0.1
modality_dropout_p: 0.0
consistency_lambda: 0.1
branch_aux_lambda: 0.4
gate_reg_lambda: 0.001

device: "cuda"
use_amp: true
amp_dtype: "float16"
